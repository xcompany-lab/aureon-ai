# Aureon AI — Persona Registry
# Version: 3.0.0
# Updated: 2026-03-06

identity:
  enabled: true
  level: 2  # 1=minimal (@id), 2=named (Name Role), 3=full (Name the Role | Element)
  locale: pt-BR

layers:
  L0_SYSTEM:
    name: "System Agents"
    icon: "⚙️"
    location: "core/aureon/"
    description: "Orquestradores imutáveis do sistema"
    auto_create: false

  L1_CONCLAVE:
    name: "Conclave"
    icon: "👑"
    location: "agents/conclave/"
    description: "Deliberação constitucional multi-perspectiva"
    trigger: "manual"
    command: "/conclave"

  L2_BOARDROOM:
    name: "Boardroom"
    icon: "🏛️"
    location: "agents/boardroom/"
    description: "C-Level estratégico"
    trigger: "threshold"
    threshold:
      weighted_score: 10
      min_sources: 2

  L3_MINDS:
    name: "Mind Clones"
    icon: "🧠"
    location: "agents/minds/"
    description: "Especialistas clonados via DNA extraction"
    trigger: "pipeline"
    phase: "5.2"

  L4_CARGO:
    name: "Cargo Roles"
    icon: "👔"
    location: "agents/cargo/"
    description: "Papéis operacionais"
    trigger: "threshold"
    threshold:
      weighted_score: 5

  L5_SQUADS:
    name: "SQUADs"
    icon: "🚀"
    location: "agents/squads/"
    description: "Times de especialistas por setor"
    trigger: "keyword"

  SUB_AGENTS:
    name: "Operatives"
    icon: "⚡"
    location: ".claude/aureon/sub-agents/"
    description: "Operativos do Aureon Core"
    trigger: "keyword"

